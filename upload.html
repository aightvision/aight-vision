<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — AIGHT.VISION</title>
  <style>
    :root {
      --aight-yellow: #C8A63C;
      --aight-yellow-hover: #d8b345;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0a0a0a;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
    }

    /* ── New button convention: {BUTTON} ─────────────────────────── */

    .aight-btn {
      background: #000;
      color: var(--aight-yellow);
      border: 1px solid var(--aight-yellow);
      padding: 6px 10px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      line-height: 1.15;
      user-select: none;
    }
    .aight-btn::before { content: "{"; opacity: 0.9; padding-right: 3px; }
    .aight-btn::after  { content: "}"; opacity: 0.9; padding-left: 3px; }
    .aight-btn:hover { background: rgba(200,166,60,0.15); }

    .aight-btn.important,
    .aight-btn.active {
      background: var(--aight-yellow);
      color: #000;
      font-weight: 700;
    }
    .aight-btn.important:hover,
    .aight-btn.active:hover { background: var(--aight-yellow-hover); }

    /* Refresh button: brackets normal size, ⟲ glyph 3× larger */
    .aight-btn.big-glyph {
      padding: 4px 10px;
      font-size: 11px;
      line-height: 1;
    }
    .aight-btn.big-glyph .glyph {
      font-size: 32px;
      line-height: 0.7;
      display: inline-block;
      padding: 0 2px;
      transform: translateY(1px);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      gap: 28px;
    }

    h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    /* ── Auth ────────────────────────────────────────────────────── */

    #auth { display: flex; gap: 10px; width: 100%; max-width: 360px; }
    #auth.hidden { display: none; }
    #secret-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s;
    }
    #secret-input:focus { border-color: rgba(255,255,255,0.4); }
    #secret-input.error { border-color: #c0392b; }
    #auth-btn {
      background: #1a1a1a; border: 1px solid #333; color: #aaa;
      padding: 10px 18px; border-radius: 6px; cursor: pointer;
      font-size: 13px; letter-spacing: 0.1em;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    #auth-btn:hover { border-color: #555; color: #fff; }

    /* ── ffmpeg status pill (bottom-right after auth) ───────────── */

    #ffmpeg-status {
      position: fixed;
      bottom: 12px; right: 12px;
      z-index: 5;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.4);
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #ffmpeg-status.show { opacity: 1; }
    #ffmpeg-status.ready { color: rgba(100,200,120,0.7); }
    #ffmpeg-status.error { color: rgba(230,120,120,0.9); }

    /* ── Upload area ─────────────────────────────────────────────── */

    #upload-area {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1080px;
      gap: 20px;
    }
    #upload-area.visible { display: flex; }

    #drop-zone {
      width: 100%;
      max-width: 560px;
      border: 1.5px dashed #2a2a2a;
      border-radius: 10px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.drag-over { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); }
    #drop-zone p { color: rgba(255,255,255,0.2); letter-spacing: 0.1em; font-size: 12px; text-transform: uppercase; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    label.pick-btn, button.pick-btn {
      background: #1e1e1e; border: 1px solid #2e2e2e; color: #bbb;
      padding: 9px 20px; border-radius: 6px;
      font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    label.pick-btn:hover, button.pick-btn:hover { border-color: #555; color: #fff; }
    input[type=file] { display: none; }

    /* ── Queue ───────────────────────────────────────────────────── */

    #queue { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 8px; }

    .q-item { background: #141414; border: 1px solid #222; border-radius: 7px; padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
    .q-item-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .q-name { font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .q-status { font-size: 11px; letter-spacing: 0.08em; white-space: nowrap; flex-shrink: 0; }
    .q-status.pending { color: #555; }
    .q-status.uploading { color: #888; }
    .q-status.done { color: #4caf50; }
    .q-status.error { color: #e57373; }
    .q-status.processing { color: #a3a3ff; }
    .q-bar-wrap { height: 2px; background: #222; border-radius: 2px; overflow: hidden; }
    .q-bar { height: 100%; background: rgba(255,255,255,0.5); border-radius: 2px; transition: width 0.2s; width: 0%; }
    .q-bar.done  { background: #4caf50; width: 100%; }
    .q-bar.error { background: #e57373; width: 100%; }

    .q-trim-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .q-trim-btn:hover { background: rgba(255,255,255,0.18); border-color: #fff; }
    .q-trim-info { font-size: 10px; color: rgba(163,163,255,0.85); letter-spacing: 0.05em; }

    /* Start-upload button (manual trigger for the queue) */
    #queue-actions { width: 100%; max-width: 560px; display: none; justify-content: center; padding: 4px 0 8px; }
    #queue-actions.visible { display: flex; }
    #start-upload {
      background: rgba(90,200,130,0.85);
      border: 1px solid rgba(90,200,130,1);
      color: #000;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    #start-upload:hover { background: rgba(105,220,145,1); }
    #start-upload:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.15); cursor: default; }

    #summary { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; }

    /* ── Library ─────────────────────────────────────────────────── */

    #library {
      display: none;
      width: 100%;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #1a1a1a;
      flex-direction: column;
      gap: 14px;
    }
    #library.visible { display: flex; }

    .lib-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .lib-header-top { display: flex; align-items: center; gap: 12px; }
    .lib-title { font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    .lib-count { font-size: 11px; color: rgba(255,255,255,0.2); }
    .lib-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    #library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

    .lib-item { position: relative; background: #141414; border: 1px solid #222; border-radius: 7px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: border-color 0.15s; }
    .lib-item:hover { border-color: #333; }
    /* Publish state is indicated ONLY by presence/absence of the circle avatar */
    .lib-avatar {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: url('homeimage.jpg') center/cover, #000;
      z-index: 2;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
    }

    .lib-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16 / 10; background: #0a0a0a; overflow: hidden; }
    .lib-thumb { width: 100%; height: 100%; object-fit: cover; background: #0a0a0a; display: block; }
    .lib-name { font-size: 10px; color: rgba(255,255,255,0.5); padding: 6px 8px 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lib-meta { padding: 0 8px 4px; display: flex; justify-content: space-between; align-items: center; gap: 4px; font-size: 9px; color: rgba(255,255,255,0.3); }
    .lib-tags { padding: 0 8px 6px; display: flex; flex-wrap: wrap; gap: 3px; }
    .lib-tag-chip { font-size: 9px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); padding: 1px 6px; border-radius: 3px; letter-spacing: 0.03em; }

    .lib-delete {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 2;
    }
    .lib-delete svg { width: 14px; height: 14px; }
    .lib-delete:hover, .lib-delete:active { background: rgba(220,60,60,0.85); color: #fff; }

    .lib-empty { color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 0.1em; padding: 20px 0; text-align: center; grid-column: 1 / -1; }

    /* ── Tag filter panel (for grid) ─────────────────────────────── */

    #tag-panel {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #tag-panel.open { opacity: 1; pointer-events: auto; }

    .tag-panel-inner {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: min(340px, 82vw);
      background: rgba(12,12,12,0.95);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      padding: 20px 22px 24px;
    }
    #tag-panel.open .tag-panel-inner { transform: translateX(0); }

    .tag-panel-head { display: flex; align-items: center; margin-bottom: 16px; }
    .tag-panel-title { font-size: 11px; letter-spacing: 0.32em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .tag-panel-close { margin-left: auto; width: 30px; height: 30px; background: transparent; border: none; color: rgba(255,255,255,0.55); cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .tag-panel-close svg { width: 18px; height: 18px; }

    .tag-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .tag-section-title { font-size: 10px; letter-spacing: 0.22em; color: rgba(255,255,255,0.25); text-transform: uppercase; padding: 14px 4px 6px; }
    .tag-row { display: flex; align-items: center; padding: 10px 4px; color: rgba(255,255,255,0.75); font-size: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; border-bottom: 1px solid rgba(255,255,255,0.04); transition: color 0.15s; }
    .tag-row:hover { color: #fff; }
    .tag-row.selected { color: #fff; }
    .tag-row .tag-marker { width: 8px; height: 8px; border-radius: 50%; background: transparent; border: 1px solid rgba(255,255,255,0.35); margin-right: 12px; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .tag-row.selected .tag-marker { background: #fff; border-color: #fff; }
    .tag-row .tag-name { flex: 1; }
    .tag-row .tag-count { color: rgba(255,255,255,0.35); font-size: 12px; margin-left: 8px; }
    .tag-row.tag-all, .tag-row.tag-none, .tag-row.tag-length { color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }

    .tag-section-reset { padding: 8px 0 6px; display: flex; justify-content: flex-end; }
    .tag-actions { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: center; }
    .tag-actions .aight-btn { font-size: 12px; padding: 8px 16px; }

    /* ── Modal (video detail) ────────────────────────────────────── */

    #modal {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #modal.open { opacity: 1; pointer-events: auto; }

    .modal-inner {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      width: 100%;
      max-width: 720px;
      max-height: calc(100vh - 40px);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* Close button uses the same {} convention. In edit mode it swaps
       label + color to green {EXIT} (see .modal-inner.editing rule). */
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      z-index: 4;
      font-size: 12px;
      padding: 6px 10px;
    }
    .modal-close .close-label::before { content: '×'; }
    .modal-inner.editing .modal-close {
      color: #6ecf7a;
      border-color: #6ecf7a;
    }
    .modal-inner.editing .modal-close:hover { background: rgba(110,207,122,0.15); }
    .modal-inner.editing .modal-close .close-label::before { content: 'EXIT'; }

    /* Publish button bar sits above the video */
    .modal-publish-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 14px 10px;
      background: #0d0d0d;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .modal-publish-bar .aight-btn { font-size: 12px; padding: 8px 16px; }

    .modal-video-wrap { position: relative; }
    #modal-video { width: 100%; max-height: 55vh; background: #000; display: block; }

    /* Crop overlay (inside modal video area during crop mode) */
    #crop-overlay {
      position: absolute; inset: 0;
      display: none;
      z-index: 3;
    }
    #crop-overlay.active { display: block; }

    #crop-rect {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.65);
      cursor: move;
      touch-action: none;
    }

    .crop-handle {
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.6);
      touch-action: none;
    }
    .crop-handle.tl { top: 0; left: 0; transform: translate(-50%, -50%); cursor: nw-resize; }
    .crop-handle.tr { top: 0; left: 100%; transform: translate(-50%, -50%); cursor: ne-resize; }
    .crop-handle.bl { top: 100%; left: 0; transform: translate(-50%, -50%); cursor: sw-resize; }
    .crop-handle.br { top: 100%; left: 100%; transform: translate(-50%, -50%); cursor: se-resize; }
    .crop-handle.t  { top: 0; left: 50%; transform: translate(-50%, -50%); cursor: n-resize; }
    .crop-handle.b  { top: 100%; left: 50%; transform: translate(-50%, -50%); cursor: s-resize; }
    .crop-handle.l  { top: 50%; left: 0; transform: translate(-50%, -50%); cursor: w-resize; }
    .crop-handle.r  { top: 50%; left: 100%; transform: translate(-50%, -50%); cursor: e-resize; }

    .modal-body { padding: 14px 18px 18px; overflow-y: auto; }

    .modal-name-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; min-height: 32px; }
    .modal-name-text { font-size: 14px; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .modal-name-input {
      background: #1a1a1a; border: 1px solid #333; color: #fff;
      padding: 6px 10px; border-radius: 5px; font-size: 13px;
      font-family: inherit; outline: none; flex: 1; display: none;
    }
    .modal-name-input:focus { border-color: rgba(255,255,255,0.4); }
    .modal-name-wrap.editing .modal-name-text { display: none; }
    .modal-name-wrap.editing .modal-name-input { display: block; }

    .modal-meta-row { display: flex; gap: 12px; margin-bottom: 12px; font-size: 11px; color: rgba(255,255,255,0.4); }

    /* Slug row */
    .modal-slug-row {
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .modal-slug-row.visible { display: flex; }
    .modal-slug-label {
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 9px;
      flex-shrink: 0;
    }
    .modal-slug-url {
      flex: 1;
      min-width: 0;
      color: rgba(255,255,255,0.85);
      font-family: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: text;
      padding: 3px 0;
      user-select: all;
    }
    .modal-slug-input {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      outline: none;
      display: none;
    }
    .modal-slug-input:focus { border-color: rgba(255,255,255,0.4); }
    .modal-slug-row.editing .modal-slug-url { display: none; }
    .modal-slug-row.editing .modal-slug-input { display: block; }
    .slug-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      letter-spacing: 0.05em;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .slug-btn:hover { color: #fff; border-color: #fff; }
    .slug-btn.copied { color: #4caf50; border-color: #4caf50; }

    .modal-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .modal-tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
      padding: 4px 4px 4px 10px; border-radius: 12px; font-size: 12px;
    }
    .modal-tag-chip button {
      background: transparent; border: none; color: rgba(255,255,255,0.5);
      cursor: pointer; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1;
    }
    .modal-tag-chip button:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .modal-tag-add {
      background: #1a1a1a; border: 1px solid #333; color: #fff;
      padding: 4px 10px; border-radius: 12px; font-size: 12px; font-family: inherit;
      outline: none; width: 130px; transition: border-color 0.15s;
    }
    .modal-tag-add:focus { border-color: rgba(255,255,255,0.4); }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 4px;
      flex-wrap: wrap;
    }
    .modal-actions .aight-btn { font-size: 11px; padding: 7px 10px; }

    /* Hide the normal action row and publish bar while editing so save/cancel are the only choices */
    .modal-inner.editing .modal-actions,
    .modal-inner.editing .modal-name-wrap,
    .modal-inner.editing .modal-slug-row,
    .modal-inner.editing .modal-tag-list,
    .modal-inner.editing .modal-publish-bar { display: none; }
    .modal-inner.editing .modal-meta-row { opacity: 0.4; }

    /* Edit mode toolbar */
    .edit-toolbar {
      margin-top: 0;
      padding: 14px 0 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .edit-toolbar.active { display: flex; }

    .edit-mode-picker { display: flex; gap: 8px; justify-content: center; }
    .edit-mode-picker .aight-btn.selected { background: var(--aight-yellow); color: #000; font-weight: 700; }

    .edit-controls { padding: 4px 0; display: none; }
    .edit-controls.active { display: block; }

    /* {←} reset (left) and {aight} commit (right) span the bottom of the edit toolbar */
    .edit-confirm-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .edit-confirm-row .aight-btn { font-size: 13px; padding: 10px 18px; }
    .edit-confirm-row .reset-glyph { font-size: 16px; padding: 8px 14px; }

    .edit-warning { text-align: center; font-size: 10px; color: rgba(255,180,80,0.8); letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 0; }

    /* ── Trim UI (used both in edit-mode and in standalone trim modal) ── */

    .trim-timeline { padding: 6px 4px; }
    .trim-track-wrap { position: relative; height: 26px; padding: 0 8px; }
    .trim-track {
      position: relative;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-top: 10px;
    }
    .trim-selection {
      position: absolute; top: 0; bottom: 0;
      background: rgba(255,255,255,0.45);
      border-radius: 3px;
      pointer-events: none;
    }
    .trim-playhead {
      position: absolute; top: -3px; bottom: -3px;
      width: 2px; background: rgba(255,255,255,0.7);
      pointer-events: none;
    }
    .trim-handle {
      position: absolute;
      top: 50%; transform: translate(-50%, -50%);
      width: 16px; height: 22px;
      background: #fff;
      border-radius: 3px;
      cursor: ew-resize;
      touch-action: none;
      z-index: 2;
    }
    .trim-label { display: flex; justify-content: space-between; padding: 6px 8px 0; font-size: 11px; color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; }

    /* ── Standalone Trim modal (queue trim + modal trim) ────────── */

    #trim-modal {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #trim-modal.open { opacity: 1; pointer-events: auto; }

    .trim-inner {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      width: 100%; max-width: 720px;
      max-height: calc(100vh - 40px);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }

    #trim-video { width: 100%; max-height: 55vh; background: #000; display: block; }

    .trim-body { padding: 14px 18px 18px; }
    .trim-title { font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 10px; }

    /* ── Processing overlay (for ffmpeg runs) ───────────────────── */

    #processing {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    #processing.open { opacity: 1; pointer-events: auto; }
    .processing-inner {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 22px 26px;
      width: min(340px, 82vw);
      display: flex; flex-direction: column; gap: 12px;
      align-items: center;
    }
    .processing-title { font-size: 12px; letter-spacing: 0.25em; color: rgba(255,255,255,0.65); text-transform: uppercase; }
    .processing-bar-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .processing-bar { height: 100%; background: rgba(255,255,255,0.65); width: 0%; transition: width 0.15s; }
    .processing-info { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-align: center; }
  </style>

<script>
(function () {
  const VIDEO_EXT = /\.(mp4|mov|avi|webm|mkv|m4v|3gp|flv|wmv|hevc|ts|mts|m2ts)$/i;
  const MAX_CONCURRENT = 2;

  // Length buckets: [id, label, minSec, maxSec]
  const LENGTH_BUCKETS = [
    ['0-10',  'under 10s', 0,    10],
    ['10-30', '10 – 30s',  10,   30],
    ['30-60', '30 – 60s',  30,   60],
    ['60+',   'over 60s',  60,   Infinity],
  ];

  let secret = sessionStorage.getItem('uploadSecret') || '';
  let queue = [];
  let running = 0;

  let libraryItems = [];
  let libraryFiltered = [];
  let modalIdx = -1;

  // Filter state
  const selectedTags = new Set();
  const selectedLengths = new Set();
  let selectNoTags = false;
  let selectAll = true;
  let showOnlyUnpublished = false;  // toggled by the {unpublished} button

  // ── DOM ─────────────────────────────────────────────────────────

  const $ = id => document.getElementById(id);
  const authEl      = $('auth');
  const secretIn    = $('secret-input');
  const authBtn     = $('auth-btn');
  const uploadArea  = $('upload-area');
  const dropZone    = $('drop-zone');
  const queueEl     = $('queue');
  const summaryEl   = $('summary');
  const libEl       = $('library');
  const libGrid     = $('library-grid');
  const libCount    = $('lib-count');
  const tagPanel    = $('tag-panel');
  const tagListEl   = $('tag-list');
  const modalEl     = $('modal');
  const modalVideo  = $('modal-video');
  const modalNameWrap  = $('modal-name-wrap');
  const modalNameText  = $('modal-name-text');
  const modalNameInput = $('modal-name-input');
  const modalMeta      = $('modal-meta');
  const modalTagListEl = $('modal-tag-list');
  const editToolbar    = $('edit-toolbar');
  const editTrimPanel  = $('edit-trim-panel');
  const editCropPanel  = $('edit-crop-panel');
  const trimModal      = $('trim-modal');
  const trimVideo      = $('trim-video');
  const processingEl   = $('processing');
  const processingBar  = $('processing-bar');
  const processingInfo = $('processing-info');
  const processingTitle = $('processing-title');
  const ffmpegStatus   = $('ffmpeg-status');
  const cropOverlay    = $('crop-overlay');
  const cropRect       = $('crop-rect');
  const slugRow        = $('modal-slug-row');
  const slugUrlEl      = $('modal-slug-url');
  const slugInputEl    = $('modal-slug-input');

  let currentSlugUrls  = { url: '', extUrl: '' };

  // ── Utils ───────────────────────────────────────────────────────

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function displayName(key) { return key.replace(/^\d+_/, '') || key; }
  function normalizeTag(raw) {
    return String(raw||'').trim().toLowerCase()
      .replace(/[^a-z0-9-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  }
  function fmtTime(sec) {
    if (!isFinite(sec) || sec < 0) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }
  function authedFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers || {}, { 'x-upload-secret': secret });
    return fetch(url, opts);
  }
  function isVideo(name) { return VIDEO_EXT.test(name); }
  function getDurationOfBlob(blob) {
    return new Promise(function (resolve) {
      const v = document.createElement('video');
      v.preload = 'metadata';
      const url = URL.createObjectURL(blob);
      v.onloadedmetadata = function () {
        const d = v.duration;
        URL.revokeObjectURL(url);
        resolve(isFinite(d) ? d : null);
      };
      v.onerror = function () { URL.revokeObjectURL(url); resolve(null); };
      v.src = url;
    });
  }

  // ── Auth + ffmpeg preload ───────────────────────────────────────

  function unlock(key) {
    secret = key;
    sessionStorage.setItem('uploadSecret', key);
    authEl.classList.add('hidden');
    uploadArea.classList.add('visible');
    libEl.classList.add('visible');
    loadLibrary();
    startFFmpegPreload();
  }
  if (secret) unlock(secret);

  authBtn.addEventListener('click', function () {
    const val = secretIn.value.trim();
    if (!val) { secretIn.classList.add('error'); return; }
    secretIn.classList.remove('error');
    unlock(val);
  });
  secretIn.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') authBtn.click();
    secretIn.classList.remove('error');
  });

  // ── ffmpeg.wasm loader (~30MB WASM lazy-loaded from CDN) ────────

  const FFMPEG_LIB_URL  = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js';
  const FFMPEG_CORE_URL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js';
  const FFMPEG_WASM_URL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm';

  let ffmpegPromise = null;

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = function () { reject(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }

  async function loadFFmpeg() {
    if (ffmpegPromise) return ffmpegPromise;
    ffmpegPromise = (async function () {
      if (!window.FFmpegWASM) await loadScript(FFMPEG_LIB_URL);
      const FFmpegClass = window.FFmpegWASM.FFmpeg;
      const ff = new FFmpegClass();
      await ff.load({ coreURL: FFMPEG_CORE_URL, wasmURL: FFMPEG_WASM_URL });
      ff.on('progress', function (e) {
        if (typeof e.progress === 'number') updateProgress(Math.min(1, Math.max(0, e.progress)));
      });
      return ff;
    })();
    return ffmpegPromise;
  }

  function startFFmpegPreload() {
    ffmpegStatus.textContent = 'loading edit tools…';
    ffmpegStatus.className = 'show';
    loadFFmpeg().then(function () {
      ffmpegStatus.textContent = 'edit tools ready';
      ffmpegStatus.classList.add('ready');
      setTimeout(function () { ffmpegStatus.classList.remove('show'); }, 2500);
    }).catch(function (err) {
      console.error(err);
      ffmpegStatus.textContent = 'edit tools failed to load';
      ffmpegStatus.classList.add('error');
    });
  }

  // ── Processing overlay ──────────────────────────────────────────

  function showProcessing(title, info) {
    processingTitle.textContent = title || 'processing';
    processingInfo.textContent = info || 'this may take a moment';
    processingBar.style.width = '0%';
    processingEl.classList.add('open');
  }
  function hideProcessing() { processingEl.classList.remove('open'); }
  function updateProgress(pct) { processingBar.style.width = Math.round(pct * 100) + '%'; }

  // ── FFmpeg operations ───────────────────────────────────────────

  async function runTrim(blob, startSec, endSec) {
    const ff = await loadFFmpeg();
    const data = new Uint8Array(await blob.arrayBuffer());
    const inName = 'in_' + Date.now() + '.mp4';
    const outName = 'out_' + Date.now() + '.mp4';
    await ff.writeFile(inName, data);
    // -ss before -i: fast input seek (nearest keyframe). -c copy: no re-encode.
    await ff.exec([
      '-ss', String(startSec.toFixed(3)),
      '-to', String(endSec.toFixed(3)),
      '-i', inName,
      '-c', 'copy',
      '-avoid_negative_ts', 'make_zero',
      '-movflags', '+faststart',
      outName,
    ]);
    const out = await ff.readFile(outName);
    try { await ff.deleteFile(inName); } catch (e) {}
    try { await ff.deleteFile(outName); } catch (e) {}
    return new Blob([out.buffer], { type: 'video/mp4' });
  }

  async function runCrop(blob, x, y, w, h) {
    const ff = await loadFFmpeg();
    const data = new Uint8Array(await blob.arrayBuffer());
    const inName = 'in_' + Date.now() + '.mp4';
    const outName = 'out_' + Date.now() + '.mp4';
    await ff.writeFile(inName, data);
    // crop=w:h:x:y — pixel coordinates from top-left of the source
    await ff.exec([
      '-i', inName,
      '-vf', 'crop=' + Math.round(w) + ':' + Math.round(h) + ':' + Math.round(x) + ':' + Math.round(y),
      '-c:v', 'libx264',
      '-preset', 'ultrafast',
      '-c:a', 'copy',
      '-movflags', '+faststart',
      outName,
    ]);
    const out = await ff.readFile(outName);
    try { await ff.deleteFile(inName); } catch (e) {}
    try { await ff.deleteFile(outName); } catch (e) {}
    return new Blob([out.buffer], { type: 'video/mp4' });
  }

  // ── File collection (drag/drop, pickers) ────────────────────────

  function collectFromEntry(entry) {
    return new Promise(function (resolve) {
      if (entry.isFile) {
        entry.file(function (f) { resolve(isVideo(f.name) ? [f] : []); });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const collected = [];
        (function readAll() {
          reader.readEntries(function (entries) {
            if (!entries.length) {
              Promise.all(collected).then(function (groups) { resolve(groups.flat()); });
              return;
            }
            for (const e of entries) collected.push(collectFromEntry(e));
            readAll();
          });
        }());
      } else { resolve([]); }
    });
  }
  function addFiles(files) {
    const filtered = files.filter(function (f) { return isVideo(f.name); });
    if (!filtered.length) return;
    for (const f of filtered) {
      const item = { id: Math.random().toString(36).slice(2), file: f, name: f.name, status: 'pending', pct: 0, trimmed: null };
      queue.push(item);
      renderQueueItem(item);
    }
    // Uploads are manual now — user clicks the "upload" button to start
    updateStartButton();
    updateQueueSummary();
  }

  function updateStartButton() {
    const pending = queue.filter(function (i) { return i.status === 'pending'; }).length;
    const bar = $('queue-actions');
    const btn = $('start-upload');
    const count = $('pending-count');
    if (pending > 0 && running === 0) {
      bar.classList.add('visible');
      count.textContent = '(' + pending + ')';
      btn.disabled = false;
    } else {
      bar.classList.remove('visible');
    }
  }

  $('start-upload').addEventListener('click', function () {
    processQueue();
    updateStartButton();
  });

  dropZone.addEventListener('dragover',  function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const items = e.dataTransfer.items;
    if (items && items.length) {
      const promises = [];
      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
        if (entry) promises.push(collectFromEntry(entry));
        else {
          const f = items[i].getAsFile();
          if (f) promises.push(Promise.resolve(isVideo(f.name) ? [f] : []));
        }
      }
      Promise.all(promises).then(function (groups) { addFiles(groups.flat()); });
    } else if (e.dataTransfer.files.length) { addFiles(Array.from(e.dataTransfer.files)); }
  });
  $('file-input').addEventListener('change', function () { addFiles(Array.from(this.files)); this.value = ''; });
  $('folder-input').addEventListener('change', function () { addFiles(Array.from(this.files)); this.value = ''; });
  if (/Mobi|Android/i.test(navigator.userAgent)) $('folder-label').style.display = 'none';

  // ── Upload queue ────────────────────────────────────────────────

  function processQueue() {
    while (running < MAX_CONCURRENT) {
      const item = queue.find(function (i) { return i.status === 'pending'; });
      if (!item) break;
      item.status = 'uploading';
      running++;
      uploadItem(item);
    }
    updateStartButton();
    if (running === 0 && queue.some(function (i) { return i.status === 'done'; })) {
      loadLibrary();
    }
  }

  async function uploadItem(item) {
    // Capture duration client-side so it's stored as metadata on R2
    const duration = await getDurationOfBlob(item.file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');
    xhr.setRequestHeader('x-upload-secret', secret);
    xhr.setRequestHeader('x-file-name', encodeURIComponent(item.name));
    xhr.setRequestHeader('x-file-type', item.file.type || 'application/octet-stream');
    if (duration != null) xhr.setRequestHeader('x-video-duration', String(duration));

    xhr.upload.addEventListener('progress', function (e) {
      if (e.lengthComputable) { item.pct = e.loaded / e.total; updateQueueItem(item); }
    });
    xhr.addEventListener('load', function () {
      running--;
      if (xhr.status === 200 || xhr.status === 201) { item.status = 'done'; }
      else if (xhr.status === 401) { item.status = 'error'; item.error = 'invalid key'; sessionStorage.removeItem('uploadSecret'); }
      else { item.status = 'error'; item.error = 'failed (' + xhr.status + ')'; }
      updateQueueItem(item); updateQueueSummary(); processQueue();
    });
    xhr.addEventListener('error', function () {
      running--;
      item.status = 'error'; item.error = 'network error';
      updateQueueItem(item); updateQueueSummary(); processQueue();
    });
    xhr.send(item.file);
    updateQueueItem(item);
  }

  function renderQueueItem(item) {
    const el = document.createElement('div');
    el.className = 'q-item';
    el.id = 'qi-' + item.id;
    el.innerHTML =
      '<div class="q-item-top">' +
        '<span class="q-name">' + escHtml(item.name) + '</span>' +
        '<button class="q-trim-btn" data-id="' + item.id + '">trim</button>' +
        '<span class="q-status pending">pending</span>' +
      '</div>' +
      '<div class="q-bar-wrap"><div class="q-bar"></div></div>';
    queueEl.prepend(el);
    el.querySelector('.q-trim-btn').addEventListener('click', function () { openQueueTrim(item); });
  }

  function updateQueueItem(item) {
    const el = $('qi-' + item.id);
    if (!el) return;
    const statusEl = el.querySelector('.q-status');
    const bar      = el.querySelector('.q-bar');
    const trimBtn  = el.querySelector('.q-trim-btn');
    statusEl.className = 'q-status ' + item.status;

    // Hide trim button once uploading/done/error
    if (trimBtn) trimBtn.style.display = (item.status === 'pending' && !item.trimmed) ? '' : 'none';

    // Insert or update trimmed-info label
    let info = el.querySelector('.q-trim-info');
    if (item.trimmed) {
      if (!info) {
        info = document.createElement('span');
        info.className = 'q-trim-info';
        el.querySelector('.q-item-top').insertBefore(info, statusEl);
      }
      info.textContent = fmtTime(item.trimmed.start) + '–' + fmtTime(item.trimmed.end);
    } else if (info) { info.remove(); }

    if (item.status === 'pending')       { statusEl.textContent = 'pending'; bar.style.width = '0%'; }
    else if (item.status === 'processing'){ statusEl.textContent = 'trimming…'; bar.style.width = '0%'; }
    else if (item.status === 'uploading'){ statusEl.textContent = Math.round(item.pct * 100) + '%'; bar.style.width = Math.round(item.pct * 100) + '%'; }
    else if (item.status === 'done')     { statusEl.textContent = 'done'; bar.className = 'q-bar done'; }
    else if (item.status === 'error')    { statusEl.textContent = item.error || 'error'; bar.className = 'q-bar error'; }
  }

  function updateQueueSummary() {
    if (!queue.length) { summaryEl.textContent = ''; return; }
    const done = queue.filter(function (i) { return i.status === 'done'; }).length;
    const errors = queue.filter(function (i) { return i.status === 'error'; }).length;
    summaryEl.textContent = done + ' / ' + queue.length + ' uploaded' + (errors ? ' · ' + errors + ' failed' : '');
  }

  // ── Trim (queue) ────────────────────────────────────────────────

  function openQueueTrim(item) {
    if (item.status !== 'pending') return;
    openTrimModal({
      title: 'trim: ' + item.name,
      source: item.file,
      onSave: async function (start, end) {
        // Run ffmpeg trim on the file, replace item.file with the trimmed blob
        item.status = 'processing';
        updateQueueItem(item);
        showProcessing('trimming', 'first trim loads editor (~30 MB), subsequent are fast');
        try {
          const outBlob = await runTrim(item.file, start, end);
          const outFile = new File([outBlob], item.name, { type: 'video/mp4' });
          item.file = outFile;
          item.trimmed = { start, end };
          item.status = 'pending';
          hideProcessing();
          updateQueueItem(item);
          processQueue();
        } catch (err) {
          console.error('Trim failed:', err);
          hideProcessing();
          item.status = 'pending';
          updateQueueItem(item);
          alert('Trim failed. The original will upload instead.');
        }
      },
    });
  }

  // ── Library ─────────────────────────────────────────────────────

  const thumbObserver = new IntersectionObserver(function (entries) {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const vid = entry.target;
      if (vid.dataset.loaded) continue;
      vid.preload = 'metadata';
      vid.src = vid.dataset.url + '#t=0.1';
      vid.dataset.loaded = '1';
      thumbObserver.unobserve(vid);
    }
  }, { rootMargin: '300px' });

  async function loadLibrary() {
    try {
      const res = await authedFetch('/api/videos');
      if (res.status === 401) {
        sessionStorage.removeItem('uploadSecret');
        libGrid.innerHTML = '<div class="lib-empty">invalid key</div>'; return;
      }
      if (!res.ok) throw new Error('list ' + res.status);
      const data = await res.json();
      libraryItems = data.items || [];
      applyGridFilter();
      // opportunistic duration backfill for items missing duration
      backfillMissingDurations();
    } catch (err) {
      console.error('Library load failed:', err);
      libGrid.innerHTML = '<div class="lib-empty">could not load library</div>';
    }
  }

  // For items in the library without a duration, listen for the lazy thumb's
  // loadedmetadata event and PATCH the duration back to the server. This runs
  // silently in the background.
  function backfillMissingDurations() {
    for (const item of libraryItems) {
      if (item.duration != null) continue;
      // Attach a one-time listener via the observer's downstream video element
      // We do this via loadedmetadata on the thumbnail video once it's loaded
    }
    // Actual event wiring happens per-tile below.
  }

  function applyGridFilter() {
    let base = libraryItems.slice();
    // Apply the {unpublished} toggle first — narrows the pool
    if (showOnlyUnpublished) base = base.filter(function (i) { return !i.published; });

    // Reflect filter state on the {#} button
    const anyFilter = selectNoTags || selectedTags.size > 0 || selectedLengths.size > 0;
    $('lib-filter').classList.toggle('active', anyFilter);

    if (selectAll) { libraryFiltered = base; }
    else {
      libraryFiltered = base.filter(function (item) {
        // Tag axis
        if (selectNoTags || selectedTags.size > 0) {
          const empty = !item.tags || item.tags.length === 0;
          let tagOk = false;
          if (selectNoTags && empty) tagOk = true;
          if (!tagOk && selectedTags.size > 0) {
            for (const t of item.tags || []) if (selectedTags.has(t)) { tagOk = true; break; }
          }
          if (!tagOk) return false;
        }
        // Length axis
        if (selectedLengths.size > 0) {
          const d = item.duration || 0;
          let lenOk = false;
          for (const b of selectedLengths) {
            const bucket = LENGTH_BUCKETS.find(function (x) { return x[0] === b; });
            if (!bucket) continue;
            if (d >= bucket[2] && d < bucket[3]) { lenOk = true; break; }
          }
          if (!lenOk) return false;
        }
        return true;
      });
    }
    renderLibrary();
  }

  function renderLibrary() {
    libCount.textContent = libraryFiltered.length ? '(' + libraryFiltered.length + '/' + libraryItems.length + ')' : '';
    libGrid.innerHTML = '';
    if (!libraryFiltered.length) {
      libGrid.innerHTML = '<div class="lib-empty">' + (libraryItems.length ? 'no matches' : 'no videos yet') + '</div>';
      return;
    }
    for (let i = 0; i < libraryFiltered.length; i++) {
      const item = libraryFiltered[i];
      const tile = document.createElement('div');
      tile.className = 'lib-item' + (item.published ? '' : ' unpublished');
      tile.dataset.key = item.key;
      const dn = displayName(item.key);
      const tagsHtml = (item.tags || []).map(function (t) { return '<span class="lib-tag-chip">#' + escHtml(t) + '</span>'; }).join('');
      const durStr = item.duration != null ? fmtTime(item.duration) : '';
      const avatarHtml = item.published ? '<div class="lib-avatar" title="published to vision"></div>' : '';
      tile.innerHTML =
        '<div class="lib-thumb-wrap">' +
          '<video class="lib-thumb" muted playsinline preload="none"></video>' +
          '<button class="lib-delete" aria-label="Delete"><svg><use href="#icon-x"/></svg></button>' +
          avatarHtml +
        '</div>' +
        '<div class="lib-name" title="' + escHtml(dn) + '">' + escHtml(dn) + '</div>' +
        '<div class="lib-meta">' + (durStr ? '<span>' + durStr + '</span>' : '<span></span>') + '</div>' +
        (tagsHtml ? '<div class="lib-tags">' + tagsHtml + '</div>' : '');
      const thumb = tile.querySelector('.lib-thumb');
      thumb.dataset.url = item.url;
      thumbObserver.observe(thumb);
      // Duration backfill opportunistic listener
      if (item.duration == null) {
        thumb.addEventListener('loadedmetadata', function once() {
          const d = thumb.duration;
          if (!isFinite(d)) return;
          item.duration = d;
          // Update the master too
          const master = libraryItems.find(function (x) { return x.key === item.key; });
          if (master) master.duration = d;
          // Save to server (silent)
          authedFetch('/api/videos', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: item.key, duration: d }),
          }).catch(function () {});
          // Update the tile's duration cell
          const meta = tile.querySelector('.lib-meta span');
          if (meta) meta.textContent = fmtTime(d);
        }, { once: true });
      }
      tile.addEventListener('click', function () { openModalAt(i); });
      tile.querySelector('.lib-delete').addEventListener('click', function (e) {
        e.stopPropagation();
        deleteItemFromGrid(item.key, tile);
      });
      libGrid.appendChild(tile);
    }
  }

  async function deleteItemFromGrid(key, tileEl) {
    if (!confirm('Delete this video? This cannot be undone.')) return;
    try {
      const res = await authedFetch('/api/videos?key=' + encodeURIComponent(key), { method: 'DELETE' });
      if (!res.ok) throw new Error('delete ' + res.status);
      if (tileEl && tileEl.parentNode) tileEl.remove();
      libraryItems = libraryItems.filter(function (i) { return i.key !== key; });
      libraryFiltered = libraryFiltered.filter(function (i) { return i.key !== key; });
      libCount.textContent = libraryFiltered.length ? '(' + libraryFiltered.length + '/' + libraryItems.length + ')' : '';
      if (!libraryFiltered.length) libGrid.innerHTML = '<div class="lib-empty">' + (libraryItems.length ? 'no matches' : 'no videos yet') + '</div>';
    } catch (err) { console.error('Delete failed:', err); alert('Failed to delete.'); }
  }

  $('lib-refresh').addEventListener('click', loadLibrary);

  $('lib-drafts').addEventListener('click', function () {
    showOnlyUnpublished = !showOnlyUnpublished;
    this.classList.toggle('active', showOnlyUnpublished);
    applyGridFilter();
  });

  // ── Filter panel ────────────────────────────────────────────────

  $('lib-filter').addEventListener('click', function () { renderTagPanel(); tagPanel.classList.add('open'); });
  $('tag-panel-close').addEventListener('click', function () { tagPanel.classList.remove('open'); });
  $('tag-reset').addEventListener('click', function () {
    selectedTags.clear(); selectedLengths.clear();
    selectNoTags = false; selectAll = true;
    applyGridFilter(); renderTagPanel();
  });
  tagPanel.addEventListener('click', function (e) { if (e.target === tagPanel) tagPanel.classList.remove('open'); });

  function aggregateTags() {
    const counts = new Map();
    let noTagCount = 0;
    for (const item of libraryItems) {
      if (!item.tags || item.tags.length === 0) noTagCount++;
      else for (const t of item.tags) counts.set(t, (counts.get(t) || 0) + 1);
    }
    const list = Array.from(counts.entries()).sort(function (a, b) { return b[1] - a[1] || a[0].localeCompare(b[0]); });
    return { list: list, noTagCount: noTagCount, total: libraryItems.length };
  }

  function lengthCounts() {
    const counts = {};
    for (const b of LENGTH_BUCKETS) counts[b[0]] = 0;
    for (const item of libraryItems) {
      const d = item.duration != null ? item.duration : null;
      if (d == null) continue;
      for (const b of LENGTH_BUCKETS) if (d >= b[2] && d < b[3]) { counts[b[0]]++; break; }
    }
    return counts;
  }

  function renderTagPanel() {
    const agg = aggregateTags();
    const lc  = lengthCounts();
    tagListEl.innerHTML = '';

    // Tags section (with 'no tags' as first row)
    const tagHead = document.createElement('div');
    tagHead.className = 'tag-section-title';
    tagHead.textContent = 'tags';
    tagListEl.appendChild(tagHead);

    const noneRow = document.createElement('div');
    noneRow.className = 'tag-row tag-none' + (selectNoTags ? ' selected' : '');
    noneRow.innerHTML = '<span class="tag-marker"></span><span class="tag-name">no tags</span><span class="tag-count">' + agg.noTagCount + '</span>';
    noneRow.addEventListener('click', function () {
      selectNoTags = !selectNoTags; selectAll = false;
      if (!selectNoTags && selectedTags.size === 0 && selectedLengths.size === 0) selectAll = true;
      applyGridFilter(); renderTagPanel();
    });
    tagListEl.appendChild(noneRow);

    for (const [t, c] of agg.list) {
      const row = document.createElement('div');
      row.className = 'tag-row' + (selectedTags.has(t) ? ' selected' : '');
      row.innerHTML = '<span class="tag-marker"></span><span class="tag-name">' + escHtml(t) + '</span><span class="tag-count">' + c + '</span>';
      row.addEventListener('click', function () {
        if (selectedTags.has(t)) selectedTags.delete(t); else selectedTags.add(t);
        selectAll = false;
        if (selectedTags.size === 0 && !selectNoTags && selectedLengths.size === 0) selectAll = true;
        applyGridFilter(); renderTagPanel();
      });
      tagListEl.appendChild(row);
    }

    // { reset # } — under tags section
    const resetTags = document.createElement('div');
    resetTags.className = 'tag-section-reset';
    resetTags.innerHTML = '<button class="aight-btn" id="tag-reset-hash">reset #</button>';
    tagListEl.appendChild(resetTags);
    resetTags.querySelector('#tag-reset-hash').addEventListener('click', function () {
      selectedTags.clear(); selectNoTags = false;
      if (selectedLengths.size === 0) selectAll = true;
      applyGridFilter(); renderTagPanel();
    });

    // Length section
    const lenHead = document.createElement('div');
    lenHead.className = 'tag-section-title';
    lenHead.textContent = 'length';
    tagListEl.appendChild(lenHead);
    for (const b of LENGTH_BUCKETS) {
      const row = document.createElement('div');
      const sel = selectedLengths.has(b[0]);
      row.className = 'tag-row tag-length' + (sel ? ' selected' : '');
      row.innerHTML = '<span class="tag-marker"></span><span class="tag-name">' + b[1] + '</span><span class="tag-count">' + (lc[b[0]] || 0) + '</span>';
      row.addEventListener('click', function () {
        if (selectedLengths.has(b[0])) selectedLengths.delete(b[0]);
        else selectedLengths.add(b[0]);
        selectAll = false;
        if (selectedTags.size === 0 && !selectNoTags && selectedLengths.size === 0) selectAll = true;
        applyGridFilter(); renderTagPanel();
      });
      tagListEl.appendChild(row);
    }

    // { reset time } — under length section
    const resetTime = document.createElement('div');
    resetTime.className = 'tag-section-reset';
    resetTime.innerHTML = '<button class="aight-btn" id="tag-reset-time">reset time</button>';
    tagListEl.appendChild(resetTime);
    resetTime.querySelector('#tag-reset-time').addEventListener('click', function () {
      selectedLengths.clear();
      if (selectedTags.size === 0 && !selectNoTags) selectAll = true;
      applyGridFilter(); renderTagPanel();
    });
  }

  // ── Modal ───────────────────────────────────────────────────────

  function openModalAt(i) {
    if (i < 0 || i >= libraryFiltered.length) return;
    modalIdx = i;
    exitEditMode();
    renderModal();
    modalEl.classList.add('open');
  }
  function closeModal() {
    modalEl.classList.remove('open');
    modalVideo.pause();
    modalVideo.removeAttribute('src');
    modalVideo.load();
    exitRenameMode(); exitEditMode();
    modalIdx = -1;
  }
  function currentItem() { return modalIdx >= 0 ? libraryFiltered[modalIdx] : null; }

  function renderModal() {
    const item = currentItem();
    if (!item) return;
    modalVideo.src = item.url;
    modalVideo.load();
    modalNameText.textContent = displayName(item.key);
    modalNameInput.value = displayName(item.key);
    const parts = [];
    if (item.duration != null) parts.push(fmtTime(item.duration));
    if (item.size) parts.push((item.size / (1024*1024)).toFixed(1) + ' MB');
    modalMeta.textContent = parts.join('  ·  ');
    renderModalTags();
    renderSlugRow();
    renderPublishButton();
  }

  function renderPublishButton() {
    const item = currentItem();
    if (!item) return;
    const btn = $('modal-publish');
    const txt = $('modal-publish-text');
    if (item.published) {
      txt.textContent = '- from vision';
      btn.setAttribute('data-state', 'published');
    } else {
      txt.textContent = '+ to vision';
      btn.setAttribute('data-state', 'unpublished');
    }
  }

  async function togglePublish() {
    const item = currentItem();
    if (!item) return;
    const wantPublished = !item.published;
    // Optimistically flip the button
    item.published = wantPublished;
    renderPublishButton();
    // Update the corresponding grid tile visuals immediately
    const tile = libGrid.querySelector('.lib-item[data-key="' + CSS.escape(item.key) + '"]');
    if (tile) {
      tile.classList.toggle('unpublished', !wantPublished);
      let av = tile.querySelector('.lib-avatar');
      const thumbWrap = tile.querySelector('.lib-thumb-wrap');
      if (wantPublished && !av && thumbWrap) {
        av = document.createElement('div');
        av.className = 'lib-avatar';
        av.title = 'published to vision';
        thumbWrap.appendChild(av);
      } else if (!wantPublished && av) { av.remove(); }
    }
    // Persist
    try {
      const res = await authedFetch('/api/videos', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: item.key, published: wantPublished }),
      });
      if (!res.ok) throw new Error('publish ' + res.status);
      const data = await res.json();
      const master = libraryItems.find(function (x) { return x.key === item.key; });
      if (master) master.published = data.published;
      item.published = data.published;
    } catch (err) {
      console.error('Publish toggle failed:', err);
      // Roll back
      item.published = !wantPublished;
      renderPublishButton();
      if (tile) {
        tile.classList.toggle('unpublished', !item.published);
      }
      alert('Failed to update publish state.');
    }
  }

  $('modal-publish').addEventListener('click', togglePublish);

  function keyExt(key) {
    const m = String(key || '').match(/\.([^.]+)$/);
    return m ? m[1].toLowerCase() : '';
  }

  function renderSlugRow() {
    const item = currentItem();
    if (!item) {
      slugRow.classList.remove('visible', 'editing');
      return;
    }
    slugRow.classList.add('visible');
    slugRow.classList.remove('editing');
    const copyBtn    = $('modal-slug-copy');
    const copyExtBtn = $('modal-slug-copy-ext');
    const editBtn    = $('modal-slug-edit');

    if (item.slug) {
      const base = window.location.origin + '/f/';
      const shortUrl = base + item.slug;
      const ext = keyExt(item.key);
      const extUrl = ext ? shortUrl + '.' + ext : shortUrl;
      slugUrlEl.textContent = shortUrl.replace(/^https?:\/\//, '');
      slugUrlEl.style.color = '';
      slugInputEl.value = item.slug;

      else copyExtBtn.style.display = 'none';

    } else {
      slugUrlEl.textContent = '(no shareable link yet)';
      slugUrlEl.style.color = 'rgba(255,255,255,0.35)';

      currentSlugUrls = { url: '', extUrl: '' };
      copyBtn.style.display = 'none';
      copyExtBtn.style.display = 'none';
      editBtn.textContent = 'add';
    }
  }

  function clientRandomSlug(len) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    len = len || 8;
    const buf = new Uint8Array(len);
    crypto.getRandomValues(buf);
    let s = '';
    for (let i = 0; i < len; i++) s += chars[buf[i] % chars.length];
    return s;
  }

  function copyToClipboard(text, btn) {
    const flash = function () {
      const orig = btn.textContent;
      btn.classList.add('copied');
      btn.textContent = 'copied';
      setTimeout(function () { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(flash).catch(function () { legacyCopy(text, flash); });
    } else { legacyCopy(text, flash); }
  }
  function legacyCopy(text, onOk) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); onOk(); }
    catch (e) { alert('Copy failed: ' + text); }
    ta.remove();
  }

  async function commitSlugEdit() {
    const item = currentItem();
    if (!item) { slugRow.classList.remove('editing'); return; }
    let raw = slugInputEl.value.trim();
    // Empty input on a video without a slug → auto-generate a random one
    if (!raw && !item.slug) raw = clientRandomSlug(8);
    if (raw === (item.slug || '')) { slugRow.classList.remove('editing'); return; }
    try {
      const res = await authedFetch('/api/videos', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: item.key, slug: raw }),
      });
      if (res.status === 409) { alert('That slug is already in use.'); return; }
      if (res.status === 400) { alert('Invalid slug — use 3-64 characters, letters/numbers/hyphens only.'); return; }
      if (!res.ok) throw new Error('slug ' + res.status);
      const data = await res.json();
      const master = libraryItems.find(function (x) { return x.key === item.key; });
      if (master) master.slug = data.slug;
      item.slug = data.slug;
      renderSlugRow();
    } catch (err) { console.error('Slug update failed:', err); alert('Failed to update slug.'); }
  }

  // ── Modal edit mode (wrench) ────────────────────────────────────

  let editMode = null; // 'trim' | 'crop' | null
  let editBlob = null; // downloaded blob for editing (from R2)
  let editDuration = 0;
  let editTrimStart = 0, editTrimEnd = 0;

  $('modal-wrench').addEventListener('click', function () {
    if (editToolbar.classList.contains('active')) exitEditMode();
    else enterEditMode();
  });
  $('edit-reset').addEventListener('click', resetCurrentTool);
  $('edit-commit').addEventListener('click', commitEdit);
  $('edit-trim-btn').addEventListener('click', function () { switchEditMode('trim'); });
  $('edit-crop-btn').addEventListener('click', function () { switchEditMode('crop'); });

  // Reset only the parameters of the currently active tool. Video stays loaded,
  // no re-download needed. Switching tools and hitting reset again is required
  // to reset the other one.
  function resetCurrentTool() {
    if (editMode === 'trim') {
      editTrimStart = 0;
      editTrimEnd = editDuration;
      try { modalVideo.currentTime = 0; } catch (e) {}
      // Redraw handles
      wireTrimTimeline({
        video: modalVideo,
        trackEl: $('edit-trim-track'),
        selEl:   $('edit-trim-sel'),
        phEl:    $('edit-trim-ph'),
        hStart:  $('edit-trim-h-start'),
        hEnd:    $('edit-trim-h-end'),
        startLbl:$('edit-trim-start'),
        endLbl:  $('edit-trim-end'),
        durLbl:  $('edit-trim-dur'),
        getStart: () => editTrimStart,
        getEnd:   () => editTrimEnd,
        setStart: s => { editTrimStart = s; },
        setEnd:   e => { editTrimEnd   = e; },
        getDuration: () => editDuration,
      });
    } else if (editMode === 'crop') {
      cropState = { x: 10, y: 10, w: 80, h: 80 };
      drawCrop();
    }

  async function enterEditMode() {
    const item = currentItem();
    if (!item) return;
    editToolbar.classList.add('active');
    document.querySelector('.modal-inner').classList.add('editing');
    $('modal-wrench').classList.add('active');
    // Preload the video bytes into an in-memory blob for fast processing
    showProcessing('preparing video', 'downloading source for editing');
    try {
      const res = await authedFetch('/api/download?key=' + encodeURIComponent(item.key));
      if (!res.ok) throw new Error('download ' + res.status);
      const total = parseInt(res.headers.get('Content-Length') || '0', 10);
      const reader = res.body.getReader();
      const chunks = []; let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value); received += value.length;
        if (total) updateProgress(received / total);
      }
      editBlob = new Blob(chunks, { type: 'video/mp4' });
      hideProcessing();
      switchEditMode('trim');
    } catch (err) {
      console.error('Prep failed:', err);
      hideProcessing();
      alert('Could not prepare video for editing.');
      exitEditMode();
    }
  }

  function exitEditMode() {
    editToolbar.classList.remove('active');
    editTrimPanel.classList.remove('active');
    editCropPanel.classList.remove('active');
    cropOverlay.classList.remove('active');
    document.querySelector('.modal-inner').classList.remove('editing');
    $('modal-wrench').classList.remove('active');
    $('edit-trim-btn').classList.remove('selected');
    $('edit-crop-btn').classList.remove('selected');
    editMode = null;
    editBlob = null;
  }

  function switchEditMode(mode) {
    editMode = mode;
    $('edit-trim-btn').classList.toggle('selected', mode === 'trim');
    $('edit-crop-btn').classList.toggle('selected', mode === 'crop');
    editTrimPanel.classList.toggle('active', mode === 'trim');
    editCropPanel.classList.toggle('active', mode === 'crop');
    cropOverlay.classList.toggle('active', mode === 'crop');
    if (mode === 'trim') initEditTrimUI();
    else if (mode === 'crop') initCropUI();
  }

  function initEditTrimUI() {
    // Wait for modalVideo metadata to know duration
    const setup = function () {
      editDuration = modalVideo.duration;
      editTrimStart = 0;
      editTrimEnd = editDuration;
      wireTrimTimeline({
        video: modalVideo,
        trackEl: $('edit-trim-track'),
        selEl:   $('edit-trim-sel'),
        phEl:    $('edit-trim-ph'),
        hStart:  $('edit-trim-h-start'),
        hEnd:    $('edit-trim-h-end'),
        startLbl:$('edit-trim-start'),
        endLbl:  $('edit-trim-end'),
        durLbl:  $('edit-trim-dur'),
        getStart: () => editTrimStart,
        getEnd:   () => editTrimEnd,
        setStart: s => { editTrimStart = s; },
        setEnd:   e => { editTrimEnd   = e; },
        getDuration: () => editDuration,
      });
    };
    if (modalVideo.readyState >= 1) setup();
    else modalVideo.addEventListener('loadedmetadata', setup, { once: true });
  }

  async function commitEdit() {
    const item = currentItem();
    if (!item || !editBlob) return;
    if (!confirm('Save these edits? This replaces the file on the server and cannot be undone.')) return;

    let processedBlob;
    try {
      if (editMode === 'trim') {
        if (editTrimStart <= 0 && editTrimEnd >= editDuration - 0.05) { alert('Trim range covers the whole video — no change to save.'); return; }
        showProcessing('trimming', 'stream-copy trim, usually fast');
        processedBlob = await runTrim(editBlob, editTrimStart, editTrimEnd);
      } else if (editMode === 'crop') {
        if (!cropState || cropState.w <= 0 || cropState.h <= 0) { alert('Crop area invalid.'); return; }
        showProcessing('cropping', 're-encoding video, may take a bit');
        const vw = modalVideo.videoWidth;
        const vh = modalVideo.videoHeight;
        const px = (cropState.x / 100) * vw;
        const py = (cropState.y / 100) * vh;
        const pw = (cropState.w / 100) * vw;
        const ph = (cropState.h / 100) * vh;
        processedBlob = await runCrop(editBlob, px, py, pw, ph);
      } else { return; }
    } catch (err) {
      console.error('Edit failed:', err); hideProcessing();
      alert('Editing failed. Original file is unchanged.'); return;
    }

    // Upload the processed file as a new key, then delete the old
    processingTitle.textContent = 'saving';
    processingInfo.textContent = 'uploading edited version';
    updateProgress(0);
    try {
      const uploadRes = await new Promise(function (resolve, reject) {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload');
        xhr.setRequestHeader('x-upload-secret', secret);
        xhr.setRequestHeader('x-file-name', encodeURIComponent(displayName(item.key)));
        xhr.setRequestHeader('x-file-type', 'video/mp4');
        // Try to capture new duration
        getDurationOfBlob(processedBlob).then(function (d) {
          if (d != null) xhr.setRequestHeader('x-video-duration', String(d));
          xhr.upload.addEventListener('progress', function (e) {
            if (e.lengthComputable) updateProgress(e.loaded / e.total);
          });
          xhr.addEventListener('load', function () { xhr.status < 300 ? resolve(xhr) : reject(new Error('upload ' + xhr.status)); });
          xhr.addEventListener('error', function () { reject(new Error('network error')); });
          xhr.send(processedBlob);
        });
      });
      const uploadData = JSON.parse(uploadRes.responseText);

      // Preserve tags on the new object
      if (item.tags && item.tags.length) {
        await authedFetch('/api/videos', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: uploadData.key, tags: item.tags }),
        }).catch(function () {});
      }

      // Delete the original
      await authedFetch('/api/videos?key=' + encodeURIComponent(item.key), { method: 'DELETE' }).catch(function () {});

      hideProcessing();
      exitEditMode();
      await loadLibrary();
      // Try to reopen at the newly-saved key
      const newIdx = libraryFiltered.findIndex(function (x) { return x.key === uploadData.key; });
      if (newIdx >= 0) openModalAt(newIdx); else closeModal();
    } catch (err) { console.error('Save failed:', err); hideProcessing(); alert('Save failed. Original file is unchanged.'); }
  }

  // ── Trim UI wiring (shared between queue trim and modal trim) ───

  function wireTrimTimeline(opts) {
    // Initial handle positions
    const draw = function () {
      const dur = opts.getDuration();
      if (!isFinite(dur) || dur <= 0) return;
      const sPct = (opts.getStart() / dur) * 100;
      const ePct = (opts.getEnd()   / dur) * 100;
      opts.hStart.style.left = sPct + '%';
      opts.hEnd.style.left   = ePct + '%';
      opts.selEl.style.left  = sPct + '%';
      opts.selEl.style.width = (ePct - sPct) + '%';
      opts.startLbl.textContent = fmtTime(opts.getStart());
      opts.endLbl.textContent   = fmtTime(opts.getEnd());
      opts.durLbl.textContent   = fmtTime(opts.getEnd() - opts.getStart());
    };

    const onTime = function () {
      const dur = opts.getDuration();
      if (!isFinite(dur) || dur <= 0) return;
      opts.phEl.style.left = ((opts.video.currentTime / dur) * 100) + '%';
      // Loop playback within selection
      if (opts.video.currentTime >= opts.getEnd() - 0.05) opts.video.currentTime = opts.getStart();
    };
    opts.video.removeEventListener && opts.video.removeEventListener('timeupdate', opts._prevTime);
    opts._prevTime = onTime;
    opts.video.addEventListener('timeupdate', onTime);

    const beginDrag = function (which) {
      return function (e) {
        e.preventDefault();
        const rect = opts.trackEl.getBoundingClientRect();
        const move = function (ev) {
          const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
          const pct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
          const t = pct * opts.getDuration();
          if (which === 'start') {
            const ns = Math.min(t, opts.getEnd() - 0.5);
            opts.setStart(Math.max(0, ns));
            opts.video.currentTime = opts.getStart();
          } else {
            const ne = Math.max(t, opts.getStart() + 0.5);
            opts.setEnd(Math.min(opts.getDuration(), ne));
            opts.video.currentTime = opts.getEnd();
          }
          draw();
        };
        const stop = function () {
          document.removeEventListener('pointermove', move);
          document.removeEventListener('pointerup', stop);
        };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
      };
    };
    opts.hStart.onpointerdown = beginDrag('start');
    opts.hEnd.onpointerdown   = beginDrag('end');

    draw();
  }

  // ── Crop UI ─────────────────────────────────────────────────────

  let cropState = null;  // { x, y, w, h } in percentages of the video area

  function initCropUI() {
    cropState = { x: 10, y: 10, w: 80, h: 80 };
    drawCrop();
    wireCropDrag();
  }

  function drawCrop() {
    if (!cropState) return;
    cropRect.style.left   = cropState.x + '%';
    cropRect.style.top    = cropState.y + '%';
    cropRect.style.width  = cropState.w + '%';
    cropRect.style.height = cropState.h + '%';
  }

  function wireCropDrag() {
    // Wire once per initCropUI; we clear existing handlers by reassigning.
    const startDrag = function (handle) {
      return function (e) {
        e.preventDefault(); e.stopPropagation();
        const rect = cropOverlay.getBoundingClientRect();
        const startX = e.clientX;
        const startY = e.clientY;
        const orig = Object.assign({}, cropState);
        const move = function (ev) {
          const dxPct = ((ev.clientX - startX) / rect.width) * 100;
          const dyPct = ((ev.clientY - startY) / rect.height) * 100;
          const s = Object.assign({}, orig);
          if (handle === 'move') {
            s.x = Math.max(0, Math.min(100 - s.w, orig.x + dxPct));
            s.y = Math.max(0, Math.min(100 - s.h, orig.y + dyPct));
          } else {
            if (handle.indexOf('l') >= 0) { const nx = Math.max(0, Math.min(orig.x + orig.w - 5, orig.x + dxPct)); s.w = orig.w + (orig.x - nx); s.x = nx; }
            if (handle.indexOf('r') >= 0) { s.w = Math.max(5, Math.min(100 - orig.x, orig.w + dxPct)); }
            if (handle.indexOf('t') >= 0) { const ny = Math.max(0, Math.min(orig.y + orig.h - 5, orig.y + dyPct)); s.h = orig.h + (orig.y - ny); s.y = ny; }
            if (handle.indexOf('b') >= 0) { s.h = Math.max(5, Math.min(100 - orig.y, orig.h + dyPct)); }
          }
          cropState = s; drawCrop();
        };
        const stop = function () {
          document.removeEventListener('pointermove', move);
          document.removeEventListener('pointerup', stop);
        };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
      };
    };
    cropRect.onpointerdown = startDrag('move');
    const handles = cropRect.querySelectorAll('.crop-handle');
    handles.forEach(function (h) { h.onpointerdown = startDrag(h.dataset.handle); });
  }

  // ── Standalone Trim modal (queue) ───────────────────────────────

  let trimSource = null;  // { blob, onSave } current invocation
  let trimStart = 0, trimEnd = 0, trimDur = 0;

  function openTrimModal(opts) {
    trimSource = opts;
    const url = URL.createObjectURL(opts.source);
    trimVideo.src = url;
    trimVideo.load();
    $('trim-title').textContent = opts.title || 'trim';
    trimModal.classList.add('open');
    trimVideo.addEventListener('loadedmetadata', function once() {
      trimDur = trimVideo.duration;
      trimStart = 0; trimEnd = trimDur;
      wireTrimTimeline({
        video: trimVideo,
        trackEl: $('trim-track'),
        selEl:   $('trim-sel'),
        phEl:    $('trim-ph'),
        hStart:  $('trim-h-start'),
        hEnd:    $('trim-h-end'),
        startLbl:$('trim-start-lbl'),
        endLbl:  $('trim-end-lbl'),
        durLbl:  $('trim-dur-lbl'),
        getStart: () => trimStart,
        getEnd:   () => trimEnd,
        setStart: s => { trimStart = s; },
        setEnd:   e => { trimEnd   = e; },
        getDuration: () => trimDur,
      });
    }, { once: true });
  }
  function closeTrimModal() {
    trimModal.classList.remove('open');
    trimVideo.pause();
    if (trimVideo.src) URL.revokeObjectURL(trimVideo.src);
    trimVideo.removeAttribute('src');
    trimVideo.load();
    trimSource = null;
  }
  $('trim-close').addEventListener('click', closeTrimModal);
  $('trim-reset').addEventListener('click', function () {
    trimStart = 0; trimEnd = trimDur;
    try { trimVideo.currentTime = 0; } catch (e) {}
    wireTrimTimeline({
      video: trimVideo,
      trackEl: $('trim-track'),
      selEl:   $('trim-sel'),
      phEl:    $('trim-ph'),
      hStart:  $('trim-h-start'),
      hEnd:    $('trim-h-end'),
      startLbl:$('trim-start-lbl'),
      endLbl:  $('trim-end-lbl'),
      durLbl:  $('trim-dur-lbl'),
      getStart: () => trimStart,
      getEnd:   () => trimEnd,
      setStart: s => { trimStart = s; },
      setEnd:   e => { trimEnd   = e; },
      getDuration: () => trimDur,
    });
  });
  $('trim-commit').addEventListener('click', function () {
    if (!trimSource) return;
    const src = trimSource;
    const s = trimStart, e = trimEnd;
    closeTrimModal();
    if (src.onSave) src.onSave(s, e);
  });

}());
</script>

</body>
</html>
