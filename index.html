<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIGHT.VISION</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
    }

    #v0 { z-index: 1; }
    #v1 { z-index: 0; }

    /* ── Bottom controls (prev / mute / next) ─────────────────────── */

    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 32px 24px;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    #controls.show {
      opacity: 1;
      pointer-events: auto;
    }

    .btn {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .btn:active {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.6);
    }

    .btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Top-left tag filter button ───────────────────────────────── */

    #btn-tags {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    #btn-tags.show { opacity: 1; pointer-events: auto; }

    /* ── Tag panel (opens from left) ──────────────────────────────── */

    #tag-panel {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #tag-panel.open {
      opacity: 1;
      pointer-events: auto;
    }

    .tag-panel-inner {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: min(340px, 82vw);
      background: rgba(12,12,12,0.95);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      padding: 20px 22px 24px;
    }

    #tag-panel.open .tag-panel-inner {
      transform: translateX(0);
    }

    .tag-panel-head {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .tag-panel-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    .tag-panel-close {
      margin-left: auto;
      width: 30px; height: 30px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .tag-panel-close svg { width: 18px; height: 18px; }

    .tag-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .tag-row {
      display: flex;
      align-items: center;
      padding: 10px 4px;
      color: rgba(255,255,255,0.75);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: color 0.15s;
    }

    .tag-row:hover { color: #fff; }

    .tag-row.selected {
      color: #fff;
    }

    .tag-row .tag-marker {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      margin-right: 12px;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .tag-row.selected .tag-marker {
      background: #fff;
      border-color: #fff;
    }

    .tag-row .tag-name { flex: 1; }

    .tag-row .tag-count {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      margin-left: 8px;
    }

    .tag-row.tag-all,
    .tag-row.tag-none {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tag-actions {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .tag-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tag-reset:hover { color: #fff; border-color: #fff; }

    /* Tag group styling — same visual language as the upload area */
    .tag-section-title { font-size: 10px; letter-spacing: 0.22em; color: rgba(255,255,255,0.25); text-transform: uppercase; padding: 14px 4px 6px; }
    .tag-section-reset { padding: 8px 0 6px; display: flex; justify-content: flex-end; }
    .tag-scope-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tag-scope-reset:hover { color: #fff; border-color: #fff; }

    .tag-row.tag-length, .tag-row.tag-none { color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }

    .tag-plus {
      margin-left: 8px;
      padding: 2px 8px;
      font-size: 12px;
      line-height: 1;
      background: transparent;
      border: 1px solid rgba(200,166,60,0.7);
      color: rgba(200,166,60,0.9);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .tag-plus::before { content: "{"; padding-right: 2px; }
    .tag-plus::after  { content: "}"; padding-left: 2px; }
    .tag-plus:hover { background: rgba(200,166,60,0.15); }

    .tag-row.tag-nested {
      padding: 8px 4px 8px 24px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .tag-nested-marker {
      font-size: 10px;
      color: rgba(200,166,60,0.85);
      letter-spacing: 0.1em;
      margin-right: 8px;
      flex-shrink: 0;
      width: 44px;
    }
    .tag-remove-nested {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1;
      margin-left: 6px;
      flex-shrink: 0;
    }
    .tag-remove-nested:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .tag-and-dropdown {
      background: rgba(200,166,60,0.06);
      border-left: 2px solid rgba(200,166,60,0.9);
      margin: 4px 0 8px;
      padding: 4px 0;
    }
    .tag-and-dropdown .tag-row {
      padding: 8px 4px 8px 24px;
      color: rgba(255,255,255,0.75);
    }
    .tag-and-dropdown .tag-row:hover { color: #fff; background: rgba(200,166,60,0.08); }
    .tag-and-empty {
      padding: 10px 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }

    /* ── Home overlay ─────────────────────────────────────────────── */

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      cursor: pointer;
      background-image: url('homeimage.jpg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      -webkit-tap-highlight-color: transparent;
    }

    #overlay.gone { display: none; }
  </style>
</head>
<body>

<!-- Reusable SVG icon definitions -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-hash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4"  y1="9"  x2="20" y2="9"/>
    <line x1="4"  y1="15" x2="20" y2="15"/>
    <line x1="10" y1="3"  x2="8"  y2="21"/>
    <line x1="16" y1="3"  x2="14" y2="21"/>
  </symbol>
  <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="6"  y1="6"  x2="18" y2="18"/>
    <line x1="18" y1="6"  x2="6"  y2="18"/>
  </symbol>
  <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="12" x2="4" y2="12"/>
    <polyline points="10 6 4 12 10 18"/>
  </symbol>
  <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="12" x2="20" y2="12"/>
    <polyline points="14 6 20 12 14 18"/>
  </symbol>
  <symbol id="icon-speaker-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 010 7.07"/>
    <path d="M19.07 4.93a10 10 0 010 14.14"/>
  </symbol>
  <symbol id="icon-speaker-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </symbol>
</svg>

<div id="stage">
  <video id="v0" playsinline preload="auto" muted></video>
  <video id="v1" playsinline preload="auto" muted></video>
</div>

<button class="btn" id="btn-tags" aria-label="Filter by tag">
  <svg><use href="#icon-hash"/></svg>
</button>

<div id="controls">
  <button class="btn" id="btn-prev" aria-label="Previous"><svg><use href="#icon-arrow-left"/></svg></button>
  <button class="btn" id="btn-mute" aria-label="Mute"><svg><use href="#icon-speaker-on"/></svg></button>
  <button class="btn" id="btn-next" aria-label="Next"><svg><use href="#icon-arrow-right"/></svg></button>
</div>

<div id="tag-panel" aria-hidden="true">
  <div class="tag-panel-inner">
    <div class="tag-panel-head">
      <span class="tag-panel-title">tags</span>
      <button class="tag-panel-close" id="tag-panel-close" aria-label="Close">
        <svg><use href="#icon-x"/></svg>
      </button>
    </div>
    <div class="tag-list" id="tag-list"></div>
    <div class="tag-actions">
      <button class="tag-reset" id="tag-reset">reset all</button>
    </div>
  </div>
</div>

<div id="overlay" role="button" aria-label="Start"></div>

<script>
(function () {
  const v         = [document.getElementById('v0'), document.getElementById('v1')];
  const controls  = document.getElementById('controls');
  const overlay   = document.getElementById('overlay');
  const stage     = document.getElementById('stage');
  const tagBtn    = document.getElementById('btn-tags');
  const tagPanel  = document.getElementById('tag-panel');
  const tagListEl = document.getElementById('tag-list');

  let masterPlaylist = [];        // Full array of { url, tags }
  let playlist       = [];        // Currently active (filtered + shuffled) list
  let idx            = 0;
  let active         = 0;
  let started        = false;
  let pendingStart   = false;
  let hideTimer      = null;
  let prevPressAt    = 0;

  // Length buckets shared with upload area
  const LENGTH_BUCKETS = [
    ['0-10',  'under 10s', 0,    10],
    ['10-30', '10 – 30s',  10,   30],
    ['30-60', '30 – 60s',  30,   60],
    ['60+',   'over 60s',  60,   Infinity],
  ];

  // Filter state — tagGroups is Array<Set>; each Set is AND'd, groups OR
  let tagGroups = [];
  const selectedLengths = new Set();
  let selectNoTags   = false;
  let selectAll      = true;
  let expandedGroupIdx = -1;

  // Swipe tracking
  let touchStartX = 0, touchStartY = 0, touchStartT = 0;
  let consumeNextClick = false;

  // ── Utilities ──────────────────────────────────────────────────────────────

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function wrap(i) {
    return ((i % playlist.length) + playlist.length) % playlist.length;
  }

  function urlOf(item) { return item && item.url; }

  // ── Filtering ──────────────────────────────────────────────────────────────

  function allSelectedTags() {
    const s = new Set();
    for (const g of tagGroups) for (const t of g) s.add(t);
    return s;
  }

  function computeFiltered() {
    if (selectAll) return masterPlaylist.slice();
    return masterPlaylist.filter(function (item) {
      // Tag axis
      if (selectNoTags || tagGroups.length > 0) {
        const empty = !item.tags || item.tags.length === 0;
        let tagOk = false;
        if (selectNoTags && empty) tagOk = true;
        if (!tagOk) {
          for (const group of tagGroups) {
            let allMatch = true;
            for (const t of group) {
              if (!(item.tags || []).includes(t)) { allMatch = false; break; }
            }
            if (allMatch) { tagOk = true; break; }
          }
        }
        if (!tagOk) return false;
      }
      // Length axis
      if (selectedLengths.size > 0) {
        const d = item.duration || 0;
        let lenOk = false;
        for (const b of selectedLengths) {
          const bucket = LENGTH_BUCKETS.find(function (x) { return x[0] === b; });
          if (!bucket) continue;
          if (d >= bucket[2] && d < bucket[3]) { lenOk = true; break; }
        }
        if (!lenOk) return false;
      }
      return true;
    });
  }

  function applyFilter() {
    const currentUrl = started ? urlOf(playlist[idx]) : null;
    const filtered = computeFiltered();

    if (!filtered.length) {
      // No matches — keep whatever's playing, but future advance() will loop
      playlist = [];
      return;
    }

    playlist = shuffle(filtered);

    // Try to keep current index roughly aligned with what's playing.
    // If the current video is excluded by the new filter, we set idx to -1 so
    // the next advance() plays playlist[0] (rather than skipping to [1]).
    if (currentUrl) {
      const found = playlist.findIndex(function (i) { return i.url === currentUrl; });
      idx = found >= 0 ? found : -1;
    } else {
      idx = Math.floor(Math.random() * playlist.length);
    }

    // Refresh the background preload to match the new "next"
    if (started) {
      const bg = active ^ 1;
      v[bg].removeAttribute('data-src');
      v[bg].src = '';
      setTimeout(function () { preloadBg(idx + 1); }, 50);
    }
  }

  // ── Playback ───────────────────────────────────────────────────────────────

  function preloadBg(futureIdx) {
    if (!playlist.length) return;
    const bg  = active ^ 1;
    const url = urlOf(playlist[wrap(futureIdx)]);
    if (v[bg].getAttribute('data-src') !== url) {
      v[bg].setAttribute('data-src', url);
      v[bg].src = url;
      v[bg].load();
    }
  }

  function playAt(newIdx) {
    if (!playlist.length) return;
    idx = wrap(newIdx);

    const incoming = active ^ 1;
    const outgoing = active;

    v[outgoing].pause();

    const url = urlOf(playlist[idx]);
    if (v[incoming].getAttribute('data-src') !== url) {
      v[incoming].setAttribute('data-src', url);
      v[incoming].src = url;
    } else {
      try { v[incoming].currentTime = 0; } catch (e) {}
    }
    v[incoming].muted = v[outgoing].muted;
    v[incoming].style.zIndex = 1;
    v[outgoing].style.zIndex = 0;

    v[incoming].play().catch(function () {});
    active = incoming;

    setTimeout(function () { if (active === incoming) preloadBg(idx + 1); }, 350);
  }

  function advance() {
    if (!started || !playlist.length) return;
    const next = idx + 1;
    if (next >= playlist.length) {
      playlist = shuffle(playlist);
      playAt(0);
    } else {
      playAt(next);
    }
  }

  // ── Start ──────────────────────────────────────────────────────────────────

  function beginPlayback() {
    if (started || !playlist.length) return;
    started = true;
    overlay.classList.add('gone');

    const url = urlOf(playlist[idx]);
    v[0].src = url;
    v[0].setAttribute('data-src', url);
    v[0].muted = false;
    v[0].style.zIndex = 1;
    v[1].style.zIndex = 0;
    active = 0;

    v[0].play().catch(function () {
      v[0].muted = true;
      v[1].muted = true;
      v[0].play().catch(function () {});
      updateMuteIcon();
    });

    v[0].addEventListener('ended', advance);
    v[1].addEventListener('ended', advance);

    setTimeout(function () { preloadBg(idx + 1); }, 350);
  }

  function updateMuteIcon() {
    const btn = document.getElementById('btn-mute');
    btn.innerHTML = v[active].muted
      ? '<svg><use href="#icon-speaker-off"/></svg>'
      : '<svg><use href="#icon-speaker-on"/></svg>';
  }

  function handleTapToBegin() {
    if (started) return;
    if (!playlist.length) { pendingStart = true; return; }
    beginPlayback();
  }

  // ── Controls visibility ────────────────────────────────────────────────────

  function showControls() {
    controls.classList.add('show');
    tagBtn.classList.add('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function () {
      controls.classList.remove('show');
      tagBtn.classList.remove('show');
    }, 3000);
  }

  // ── Tag panel ──────────────────────────────────────────────────────────────

  function aggregateTags() {
    const counts = new Map();
    let noTagCount = 0;
    for (const item of masterPlaylist) {
      if (!item.tags || item.tags.length === 0) { noTagCount++; continue; }
      for (const t of item.tags) {
        counts.set(t, (counts.get(t) || 0) + 1);
      }
    }
    const list = Array.from(counts.entries())
      .sort(function (a, b) { return b[1] - a[1] || a[0].localeCompare(b[0]); });
    return { list: list, noTagCount: noTagCount, total: masterPlaylist.length };
  }

  function lengthCounts() {
    const counts = {};
    for (const b of LENGTH_BUCKETS) counts[b[0]] = 0;
    for (const item of masterPlaylist) {
      const d = item.duration != null ? item.duration : null;
      if (d == null) continue;
      for (const b of LENGTH_BUCKETS) if (d >= b[2] && d < b[3]) { counts[b[0]]++; break; }
    }
    return counts;
  }

  function renderTagList() {
    const agg = aggregateTags();
    const lc  = lengthCounts();
    const selected = allSelectedTags();
    tagListEl.innerHTML = '';

    // Tags section header
    const tagHead = document.createElement('div');
    tagHead.className = 'tag-section-title';
    tagHead.textContent = 'tags';
    tagListEl.appendChild(tagHead);

    // No tags
    const noneRow = document.createElement('div');
    noneRow.className = 'tag-row tag-none' + (selectNoTags ? ' selected' : '');
    noneRow.innerHTML =
      '<span class="tag-marker"></span>' +
      '<span class="tag-name">no tags</span>' +
      '<span class="tag-count">' + agg.noTagCount + '</span>';
    noneRow.addEventListener('click', function () {
      selectNoTags = !selectNoTags;
      selectAll = false;
      if (!selectNoTags && tagGroups.length === 0 && selectedLengths.size === 0) selectAll = true;
      applyFilter();
      renderTagList();
    });
    tagListEl.appendChild(noneRow);

    // Selected groups
    const countMap = new Map(agg.list);
    for (let gi = 0; gi < tagGroups.length; gi++) {
      const group = tagGroups[gi];
      const gArr = Array.from(group);
      const mainTag = gArr[0];
      const nested = gArr.slice(1);

      const row = document.createElement('div');
      row.className = 'tag-row tag-group-main selected';
      row.innerHTML =
        '<span class="tag-marker"></span>' +
        '<span class="tag-name">' + escHtml(mainTag) + '</span>' +
        '<span class="tag-count">' + (countMap.get(mainTag) || 0) + '</span>' +
        '<button class="tag-plus" data-gi="' + gi + '">+</button>';
      row.addEventListener('click', function (e) {
        if (e.target.closest('.tag-plus')) {
          expandedGroupIdx = expandedGroupIdx === gi ? -1 : gi;
          renderTagList();
          return;
        }
        tagGroups.splice(gi, 1);
        expandedGroupIdx = -1;
        selectAll = false;
        if (tagGroups.length === 0 && !selectNoTags && selectedLengths.size === 0) selectAll = true;
        applyFilter(); renderTagList();
      });
      tagListEl.appendChild(row);

      for (const nt of nested) {
        const nrow = document.createElement('div');
        nrow.className = 'tag-row tag-nested';
        nrow.innerHTML =
          '<span class="tag-nested-marker">↳ AND</span>' +
          '<span class="tag-name">' + escHtml(nt) + '</span>' +
          '<span class="tag-count">' + (countMap.get(nt) || 0) + '</span>' +
          '<button class="tag-remove-nested">×</button>';
        nrow.querySelector('.tag-remove-nested').addEventListener('click', function (e) {
          e.stopPropagation();
          tagGroups[gi].delete(nt);
          if (tagGroups[gi].size === 0) tagGroups.splice(gi, 1);
          if (tagGroups.length === 0 && !selectNoTags && selectedLengths.size === 0) selectAll = true;
          applyFilter(); renderTagList();
        });
        tagListEl.appendChild(nrow);
      }

      if (expandedGroupIdx === gi) {
        const dd = document.createElement('div');
        dd.className = 'tag-and-dropdown';
        let addedAny = false;
        for (const [t, c] of agg.list) {
          if (selected.has(t)) continue;
          const opt = document.createElement('div');
          opt.className = 'tag-row tag-and-option';
          opt.innerHTML =
            '<span class="tag-nested-marker">+ AND</span>' +
            '<span class="tag-name">' + escHtml(t) + '</span>' +
            '<span class="tag-count">' + c + '</span>';
          opt.addEventListener('click', function () {
            tagGroups[gi].add(t);
            expandedGroupIdx = -1;
            applyFilter(); renderTagList();
          });
          dd.appendChild(opt);
          addedAny = true;
        }
        if (!addedAny) dd.innerHTML = '<div class="tag-and-empty">no more tags to combine</div>';
        tagListEl.appendChild(dd);
      }
    }

    // Unselected tags
    for (const [t, c] of agg.list) {
      if (selected.has(t)) continue;
      const row = document.createElement('div');
      row.className = 'tag-row';
      row.innerHTML = '<span class="tag-marker"></span><span class="tag-name">' + escHtml(t) + '</span><span class="tag-count">' + c + '</span>';
      row.addEventListener('click', function () {
        tagGroups.push(new Set([t]));
        expandedGroupIdx = -1;
        selectAll = false;
        applyFilter(); renderTagList();
      });
      tagListEl.appendChild(row);
    }

    // { reset # }
    const resetTags = document.createElement('div');
    resetTags.className = 'tag-section-reset';
    resetTags.innerHTML = '<button class="tag-scope-reset" id="tag-reset-hash">reset #</button>';
    tagListEl.appendChild(resetTags);
    resetTags.querySelector('#tag-reset-hash').addEventListener('click', function () {
      tagGroups = []; selectNoTags = false; expandedGroupIdx = -1;
      if (selectedLengths.size === 0) selectAll = true;
      applyFilter(); renderTagList();
    });

    // Length section
    const lenHead = document.createElement('div');
    lenHead.className = 'tag-section-title';
    lenHead.textContent = 'length';
    tagListEl.appendChild(lenHead);
    for (const b of LENGTH_BUCKETS) {
      const row = document.createElement('div');
      const sel = selectedLengths.has(b[0]);
      row.className = 'tag-row tag-length' + (sel ? ' selected' : '');
      row.innerHTML = '<span class="tag-marker"></span><span class="tag-name">' + b[1] + '</span><span class="tag-count">' + (lc[b[0]] || 0) + '</span>';
      row.addEventListener('click', function () {
        if (selectedLengths.has(b[0])) selectedLengths.delete(b[0]);
        else selectedLengths.add(b[0]);
        selectAll = false;
        if (tagGroups.length === 0 && !selectNoTags && selectedLengths.size === 0) selectAll = true;
        applyFilter(); renderTagList();
      });
      tagListEl.appendChild(row);
    }

    // { reset time }
    const resetTime = document.createElement('div');
    resetTime.className = 'tag-section-reset';
    resetTime.innerHTML = '<button class="tag-scope-reset" id="tag-reset-time">reset time</button>';
    tagListEl.appendChild(resetTime);
    resetTime.querySelector('#tag-reset-time').addEventListener('click', function () {
      selectedLengths.clear();
      if (tagGroups.length === 0 && !selectNoTags) selectAll = true;
      applyFilter(); renderTagList();
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openTagPanel() {
    renderTagList();
    tagPanel.classList.add('open');
  }
  function closeTagPanel() { tagPanel.classList.remove('open'); }

  // ── Event wiring ───────────────────────────────────────────────────────────

  document.getElementById('btn-prev').addEventListener('click', function (e) {
    e.stopPropagation();
    if (!started) return;
    const now = Date.now();
    if (now - prevPressAt < 1500) {
      playAt(idx - 1);
    } else {
      v[active].currentTime = 0;
      v[active].play().catch(function () {});
    }
    prevPressAt = now;
  });

  document.getElementById('btn-next').addEventListener('click', function (e) {
    e.stopPropagation();
    if (!started) return;
    advance();
  });

  document.getElementById('btn-mute').addEventListener('click', function (e) {
    e.stopPropagation();
    const willMute = !v[active].muted;
    v[0].muted = willMute;
    v[1].muted = willMute;
    updateMuteIcon();
  });

  tagBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    openTagPanel();
  });

  document.getElementById('tag-panel-close').addEventListener('click', closeTagPanel);
  document.getElementById('tag-reset').addEventListener('click', function () {
    tagGroups = [];
    selectedLengths.clear();
    expandedGroupIdx = -1;
    selectNoTags = false;
    selectAll = true;
    applyFilter();
    renderTagList();
  });

  // Click on the dimmed backdrop area (not the inner panel) closes it
  tagPanel.addEventListener('click', function (e) {
    if (e.target === tagPanel) closeTagPanel();
  });

  // Tap on the video area to toggle pause/play — unless it was a swipe.
  stage.addEventListener('click', function () {
    if (!started) return;
    if (consumeNextClick) { consumeNextClick = false; return; }
    if (v[active].paused) v[active].play().catch(function () {});
    else v[active].pause();
  });

  // Swipe navigation on the video area
  stage.addEventListener('touchstart', function (e) {
    const t = e.changedTouches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartT = Date.now();
  }, { passive: true });

  stage.addEventListener('touchend', function (e) {
    if (!started) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    const dt = Date.now() - touchStartT;

    // Predominantly horizontal, at least 50px, under 600ms
    if (absDx > 50 && absDx > absDy * 1.4 && dt < 600) {
      consumeNextClick = true;
      if (dx < 0) advance();
      else document.getElementById('btn-prev').click();
    }
  }, { passive: true });

  overlay.addEventListener('touchend', function (e) {
    e.preventDefault();
    handleTapToBegin();
  }, { passive: false });

  overlay.addEventListener('click', handleTapToBegin);

  document.addEventListener('mousemove', showControls);
  document.addEventListener('touchstart', showControls, { passive: true });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && tagPanel.classList.contains('open')) {
      closeTagPanel();
      return;
    }
    showControls();
    if (!started) return;
    if (e.key === 'ArrowLeft')  document.getElementById('btn-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
  });

  // ── Init ───────────────────────────────────────────────────────────────────

  fetch('/api/playlist')
    .then(function (r) {
      if (!r.ok) throw new Error('playlist ' + r.status);
      return r.json();
    })
    .then(function (data) {
      if (!Array.isArray(data) || !data.length) throw new Error('empty playlist');
      // Normalize in case any items are strings (shouldn't be after backend update)
      masterPlaylist = data.map(function (d) {
        return typeof d === 'string' ? { url: d, tags: [] } : { url: d.url, tags: d.tags || [] };
      });
      playlist = shuffle(masterPlaylist.slice());
      idx = Math.floor(Math.random() * playlist.length);
      if (pendingStart) beginPlayback();
    })
    .catch(function (err) { console.error('Playlist error:', err); });

}());
</script>

</body>
</html>
